<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room Builder Café ☕</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0ebe5;color:#3a3028;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
#header{background:#fff8f4;border-bottom:2px solid #e0d0c4;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
#header h1{font-size:1rem;font-weight:700;color:#7a5c4e}
#header .sub{font-size:0.72rem;color:#a08070}
.tag{font-size:0.68rem;background:#fde8d8;color:#a06040;border-radius:12px;padding:2px 8px}

/* LAYOUT */
#app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:220px;min-width:180px;background:#fff8f4;border-right:2px solid #e0d0c4;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.panel-title{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#a08070;margin-bottom:4px}

/* Room size */
.room-size-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.room-size-grid label{font-size:0.75rem;display:flex;flex-direction:column;gap:2px;color:#5a4030}
.room-size-grid input{padding:4px 6px;border:1.5px solid #d8c8bc;border-radius:6px;font-size:0.8rem;background:#fff;color:#3a3028;width:100%}
.room-size-grid input:focus{outline:none;border-color:#c8846a}

/* Buttons */
.btn{padding:6px 10px;border:none;border-radius:7px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%;text-align:left;display:flex;align-items:center;gap:6px}
.btn:hover{opacity:.82}
.btn-primary{background:#c8846a;color:#fff}
.btn-soft{background:#e8d8cc;color:#7a5c4e}
.btn-danger{background:#f0d4cc;color:#a04030}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}

/* Palette items */
.palette{display:flex;flex-direction:column;gap:3px}
.p-item{padding:6px 8px;border:1.5px solid #d8c8bc;border-radius:7px;font-size:0.75rem;cursor:pointer;background:#fff;display:flex;align-items:center;gap:7px;transition:background .12s,border-color .12s;user-select:none}
.p-item:hover{background:#fde8d8;border-color:#c8a080}
.p-item .swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;border:1.5px solid}
.p-item .pdim{font-size:0.63rem;color:#b09080;margin-left:auto}

/* Toggles */
.toggle-row{display:flex;align-items:center;gap:7px;font-size:0.78rem}
.toggle-row input[type=checkbox]{accent-color:#c8846a;width:14px;height:14px}

/* CANVAS */
#canvas-wrap{flex:1;overflow:auto;background:#ddd6ce;padding:20px;display:flex;align-items:flex-start;justify-content:flex-start}
#room{position:relative;background:#faf7f4;cursor:crosshair}
#room.grid{background-image:linear-gradient(rgba(180,160,144,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(180,160,144,.25) 1px,transparent 1px)}

/* Room items */
.item{position:absolute;display:flex;align-items:center;justify-content:center;flex-direction:column;border:2px solid;border-radius:3px;cursor:grab;user-select:none;z-index:10;text-align:center;overflow:hidden}
.item:active{cursor:grabbing;z-index:20}
.item.selected{outline:2px solid #c8846a;outline-offset:2px;z-index:15}
.item .lbl{font-size:0.58rem;font-weight:700;pointer-events:none;line-height:1.2;padding:1px 2px;word-break:break-word;max-width:100%}
.item .sub-lbl{font-size:0.52rem;opacity:.7;pointer-events:none}

/* Item controls (shown on selected) */
.item-ctrl{position:absolute;top:1px;right:1px;display:none;gap:2px;z-index:30}
.item.selected .item-ctrl{display:flex}
.ic-btn{background:rgba(255,255,255,.85);border:none;border-radius:3px;font-size:0.62rem;cursor:pointer;padding:1px 3px;line-height:1.4}
.ic-btn:hover{background:#fde8d8}

/* Resize handle */
.resize-handle{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:se-resize;z-index:25;display:none}
.item.selected .resize-handle{display:block}
.wall-marker.selected .resize-handle{display:block}
.wall-marker.selected .item-ctrl{display:flex}
.resize-handle::after{content:'';position:absolute;bottom:2px;right:2px;width:6px;height:6px;border-right:2px solid #c8846a;border-bottom:2px solid #c8846a}

/* Wall markers */
.wall-marker{position:absolute;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:700;text-align:center;line-height:1.2;border:2px solid;z-index:8;cursor:grab;user-select:none}
.wall-marker:active{cursor:grabbing;z-index:18}
.wall-marker.selected{outline:2px solid #c8846a;outline-offset:1px}
.wm-door{background:#d8edd8;border-color:#6a9a6a;color:#2a5a2a}
.wm-window{background:#d4e4f4;border-color:#6090c0;color:#204870}
.wm-closet{background:#eae6d4;border-color:#9a9060;color:#4a4010}
.wm-outlet{background:#fde8d4;border-color:#c8846a;color:#7a3010;border-style:dashed}
.wm-bathroom{background:#d8d4ec;border-color:#7868a8;color:#382068}
.wm-noblock{background:#fce8e8;border-color:#c06060;color:#802020;border-style:dotted}

/* Inline label editor */
.lbl-input{position:absolute;inset:0;border:none;background:transparent;font-size:0.6rem;font-weight:700;text-align:center;color:inherit;outline:none;padding:2px;z-index:35;display:none}

/* Thick room walls */
#room::before{content:'';position:absolute;inset:-4px;border:6px solid #7a5c4e;pointer-events:none;z-index:50}

/* STATUS BAR */
#statusbar{background:#fff8f4;border-top:1.5px solid #e0d0c4;padding:4px 14px;font-size:0.7rem;color:#a08070;display:flex;gap:16px;align-items:center;flex-shrink:0}
#statusbar span{color:#7a5c4e;font-weight:600}

.clearance{position:absolute;pointer-events:none;z-index:5;border-radius:3px;display:flex;align-items:flex-end;justify-content:center;font-size:0.52rem;font-weight:700;letter-spacing:.03em;padding-bottom:2px}
.clr-desk{background:rgba(100,180,120,.13);border:1.5px dashed rgba(80,160,100,.5);color:#407050}
.clr-door{background:rgba(200,120,80,.1);border:1.5px dashed rgba(180,100,60,.45);color:#804020}
.clr-noblock{background:rgba(220,80,80,.1);border:1.5px dashed rgba(200,60,60,.45);color:#802020}
.item.locked{cursor:not-allowed!important;opacity:.85}
.item.locked::after{content:'🔒';position:absolute;top:2px;left:3px;font-size:0.6rem;pointer-events:none}
.wall-marker.locked{cursor:not-allowed!important;opacity:.85}

/* PRINT */
@media print{
  #sidebar,#header,#statusbar{display:none!important}
  #canvas-wrap{padding:0;overflow:visible}
  #room{border:3px solid #333!important}
}
</style>
</head>
<body>

<div id="header">
  <span style="font-size:1.2rem">☕</span>
  <h1>Room Builder Café</h1>
  <span class="sub">Simple top-down room planner</span>
  <span class="tag">v1.4</span>
  <span class="tag" style="margin-left:auto;background:#e8f4d8;color:#407020">No external libraries</span>
</div>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- Room Size -->
    <div>
      <div class="panel-title">Room Size</div>
      <div class="room-size-grid">
        <label>Width (ft)<input type="number" id="rw" value="12" min="6" max="40" step="0.5"/></label>
        <label>Length (ft)<input type="number" id="rl" value="14" min="6" max="40" step="0.5"/></label>
      </div>
      <button class="btn btn-primary" style="margin-top:5px" onclick="applyRoom()">↺ Apply Room Size</button>
    </div>

    <!-- Options -->
    <div>
      <div class="panel-title">Options</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <label class="toggle-row"><input type="checkbox" id="gridToggle" checked onchange="applyGrid()"/> Show grid</label>
        <label class="toggle-row"><input type="checkbox" id="snapToggle" checked/> Snap to grid</label>
        <label class="toggle-row"><input type="checkbox" id="clearanceToggle" onchange="renderClearances()"/> Show clearance zones</label>
      </div>
    </div>

    <!-- Furniture -->
    <div>
      <div class="panel-title">Furniture</div>
      <div class="palette" id="fpal"></div>
    </div>

    <!-- Room Markers -->
    <div>
      <div class="panel-title">Room Markers</div>
      <div class="palette" id="mpal"></div>
    </div>

    <!-- Actions -->
    <div>
      <div class="panel-title">Actions</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-soft" onclick="saveLayout()">💾 Save Layout</button>
        <button class="btn btn-soft" onclick="loadLayout()">📂 Load Saved</button>
        <button class="btn btn-soft" onclick="printLayout()">🖨️ Print / Export PDF</button>
        <button class="btn btn-danger" onclick="resetLayout()">🔄 Reset Room</button>
      </div>
    </div>

    <!-- Inspector -->
    <div id="sel-panel" style="display:none">
      <div class="panel-title">✏️ Inspector</div>
      <div style="display:flex;flex-direction:column;gap:6px">

        <!-- Label -->
        <label style="font-size:0.73rem;color:#5a4030">Label
          <input id="ins-label" type="text" style="margin-top:2px;width:100%;padding:4px 6px;border:1.5px solid #d8c8bc;border-radius:6px;font-size:0.8rem;background:#fff;color:#3a3028" oninput="applyInspector()"/>
        </label>

        <!-- Width / Depth -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <label style="font-size:0.73rem;color:#5a4030">Width&nbsp;(in)
            <input id="ins-w" type="number" min="6" max="400" step="1" style="margin-top:2px;width:100%;padding:4px 6px;border:1.5px solid #d8c8bc;border-radius:6px;font-size:0.8rem;background:#fff;color:#3a3028" oninput="applyInspector()"/>
          </label>
          <label style="font-size:0.73rem;color:#5a4030">Depth&nbsp;(in)
            <input id="ins-h" type="number" min="6" max="400" step="1" style="margin-top:2px;width:100%;padding:4px 6px;border:1.5px solid #d8c8bc;border-radius:6px;font-size:0.8rem;background:#fff;color:#3a3028" oninput="applyInspector()"/>
          </label>
        </div>

        <!-- Color + Category -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;align-items:end">
          <label style="font-size:0.73rem;color:#5a4030">Color
            <div style="display:flex;align-items:center;gap:4px;margin-top:2px">
              <input id="ins-color" type="color" style="width:32px;height:28px;padding:1px;border:1.5px solid #d8c8bc;border-radius:6px;cursor:pointer;background:#fff" oninput="applyInspector()"/>
              <span id="ins-color-val" style="font-size:0.65rem;color:#a08070">#ddd4f0</span>
            </div>
          </label>
          <label style="font-size:0.73rem;color:#5a4030">Category
            <select id="ins-cat" style="margin-top:2px;width:100%;padding:4px 5px;border:1.5px solid #d8c8bc;border-radius:6px;font-size:0.75rem;background:#fff;color:#3a3028" onchange="applyInspector()">
              <option value="">—</option>
              <option value="sleep">🛏 Sleep</option>
              <option value="work">💻 Work</option>
              <option value="storage">📦 Storage</option>
              <option value="seating">🛋 Seating</option>
              <option value="decor">🪴 Decor</option>
              <option value="marker">📍 Marker</option>
            </select>
          </label>
        </div>

        <!-- Divider -->
        <hr style="border:none;border-top:1px solid #e8d8cc;margin:2px 0"/>

        <!-- Rotate + Layer row -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <button class="btn btn-soft" onclick="rotateSelected()" style="justify-content:center">↻ Rotate <span style="opacity:.5;font-size:.62rem">[R]</span></button>
          <button class="btn btn-soft" onclick="toggleLock()" id="ins-lock-btn" style="justify-content:center">🔓 Lock</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
          <button class="btn btn-soft" onclick="bringForward()" style="justify-content:center">⬆ Forward</button>
          <button class="btn btn-soft" onclick="sendBackward()" style="justify-content:center">⬇ Back</button>
        </div>

        <!-- Divider -->
        <hr style="border:none;border-top:1px solid #e8d8cc;margin:2px 0"/>

        <!-- Duplicate + Clear + Delete -->
        <button class="btn btn-soft" onclick="duplicateSelected()">⧉ Duplicate</button>
        <button class="btn btn-soft" onclick="deselect()">✖ Clear Selection</button>
        <button class="btn btn-danger" onclick="deleteSelected()">🗑 Delete Item</button>
      </div>
    </div>

    <!-- Notes -->
    <div style="flex:1">
      <div class="panel-title">Room Notes</div>
      <textarea id="notes" style="width:100%;height:90px;resize:vertical;border:1.5px solid #d8c8bc;border-radius:7px;padding:7px;font-size:0.73rem;font-family:inherit;background:#fff;color:#3a3028;line-height:1.5" placeholder="Notes, measurements, ideas..."></textarea>
      <button class="btn btn-soft" style="margin-top:3px" onclick="saveNotes()">Save Notes</button>
    </div>

  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <div id="room" class="grid"></div>
  </div>
</div>

<div id="statusbar">
  <div>Room: <span id="st-room">12 × 14 ft</span></div>
  <div>Selected: <span id="st-sel">none</span></div>
  <div>Position: <span id="st-pos">—</span></div>
  <div>Size: <span id="st-size">—</span></div>
  <div style="margin-left:auto;font-size:0.65rem;color:#b8a898">Double-click item to rename · Drag corners to resize</div>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const PX_PER_FT = 44;
const SNAP = PX_PER_FT / 4; // 3-inch snap

const FURNITURE = [
  {type:'f',id:'queen-bed',  label:'Queen Bed',  w:60,h:80, bg:'#ddd4f0',bc:'#7060b0',emoji:'🛏️'},
  {type:'f',id:'full-bed',   label:'Full Bed',   w:54,h:75, bg:'#e0d8f4',bc:'#8878c0',emoji:'🛏️'},
  {type:'f',id:'desk',       label:'Desk',       w:59,h:28, bg:'#c8e8d8',bc:'#508868',emoji:'💻'},
  {type:'f',id:'desk-chair', label:'Desk Chair', w:22,h:22, bg:'#e4d8f0',bc:'#9070b0',emoji:'💺'},
  {type:'f',id:'nightstand', label:'Nightstand', w:20,h:16, bg:'#f0e8c8',bc:'#a08840',emoji:'🪴'},
  {type:'f',id:'dresser',    label:'Dresser',    w:48,h:18, bg:'#e4d8c8',bc:'#907858',emoji:'🗄️'},
  {type:'f',id:'bookshelf',  label:'Bookshelf',  w:36,h:12, bg:'#d8e4c8',bc:'#608040',emoji:'📚'},
  {type:'f',id:'sofa',       label:'Sofa',       w:80,h:32, bg:'#e8e0d4',bc:'#907060',emoji:'🛋️'},
  {type:'f',id:'rug',        label:'Rug',        w:60,h:84, bg:'rgba(200,180,160,.35)',bc:'#b09878',emoji:'⬛'},
];

const MARKERS = [
  {type:'m',id:'door',     label:'Door',             cls:'wm-door',     w:36,h:10,emoji:'🚪'},
  {type:'m',id:'window',   label:'Window',           cls:'wm-window',   w:36,h:8, emoji:'🪟'},
  {type:'m',id:'closet',   label:'Closet',           cls:'wm-closet',   w:36,h:12,emoji:'📦'},
  {type:'m',id:'outlet',   label:'Outlet 🔌',        cls:'wm-outlet',   w:12,h:12,emoji:'🔌'},
  {type:'m',id:'bathroom', label:'Bathroom Entrance',cls:'wm-bathroom', w:32,h:10,emoji:'🚿'},
  {type:'m',id:'noblock',  label:'No-Block Zone',    cls:'wm-noblock',  w:40,h:20,emoji:'⛔'},
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let items = [];       // {id, defId, type, x, y, w, h, rotation, label, zIndex, el}
let selected = null;
let uid = 1;
let roomW = 12, roomL = 14;

// drag state
let drag = null;      // {item, ox, oy}
// resize state
let resz = null;      // {item, startX, startY, startW, startH}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildPalette();
  applyRoom();
  loadNotes();

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
  document.getElementById('room').addEventListener('mousedown', onRoomClick);

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if ((e.key === 'r' || e.key === 'R') && selected) rotateItem(selected.id);
    if (e.key === 'Delete' && selected) deleteSelected();
  });

  const saved = localStorage.getItem('rbc-layout-v1');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      if (confirm('Load your last saved layout?')) restoreData(d);
    } catch(e) {}
  }
});

// ═══════════════════════════════════════════
// ROOM
// ═══════════════════════════════════════════
function applyRoom() {
  roomW = parseFloat(document.getElementById('rw').value) || 12;
  roomL = parseFloat(document.getElementById('rl').value) || 14;
  const room = document.getElementById('room');
  const pw = Math.round(roomW * PX_PER_FT);
  const pl = Math.round(roomL * PX_PER_FT);
  room.style.width  = pw + 'px';
  room.style.height = pl + 'px';
  room.style.backgroundSize = SNAP + 'px ' + SNAP + 'px';
  document.getElementById('st-room').textContent = roomW + ' × ' + roomL + ' ft';
  clampAll();
}

function applyGrid() {
  const room = document.getElementById('room');
  room.classList.toggle('grid', document.getElementById('gridToggle').checked);
}

// ═══════════════════════════════════════════
// PALETTES
// ═══════════════════════════════════════════
function buildPalette() {
  const fp = document.getElementById('fpal');
  FURNITURE.forEach(d => {
    const el = mkPaletteItem(d);
    el.addEventListener('click', () => addItem(d));
    fp.appendChild(el);
  });
  const mp = document.getElementById('mpal');
  MARKERS.forEach(d => {
    const el = mkPaletteItem(d);
    el.addEventListener('click', () => addItem(d));
    mp.appendChild(el);
  });
}

function mkPaletteItem(d) {
  const el = document.createElement('div');
  el.className = 'p-item';
  const swStyle = d.bg
    ? `background:${d.bg};border-color:${d.bc||'#999'}`
    : `background:#eee;border-color:#aaa`;
  el.innerHTML = `
    <div class="swatch" style="${swStyle}"></div>
    <span>${d.emoji||''} ${d.label}</span>
    <span class="pdim">${d.w}"×${d.h}"</span>
  `;
  return el;
}

// ═══════════════════════════════════════════
// ADD ITEM
// ═══════════════════════════════════════════
function addItem(def) {
  const room = document.getElementById('room');
  const pw = room.offsetWidth, ph = room.offsetHeight;
  const iw = inPx(def.w), ih = inPx(def.h);
  const cx = Math.round((pw/2 - iw/2) / SNAP) * SNAP;
  const cy = Math.round((ph/2 - ih/2) / SNAP) * SNAP;

  const item = {
    id: 'i' + (uid++),
    defId: def.id,
    type: def.type,
    x: cx, y: cy,
    w: def.w, h: def.h,
    rotation: 0,
    label: def.label,
    zIndex: uid,
    locked: false,
    color: def.bg || '',
    category: '',
    el: null
  };
  item.el = makeEl(item, def);
  items.push(item);
  room.appendChild(item.el);
  select(item);
  renderClearances();
}

// ═══════════════════════════════════════════
// CREATE DOM ELEMENT
// ═══════════════════════════════════════════
function makeEl(item, def) {
  if (!def) def = [...FURNITURE,...MARKERS].find(d => d.id === item.defId) || {};
  const el = document.createElement('div');
  el.className = item.type === 'm'
    ? 'wall-marker ' + (def.cls||'wm-door')
    : 'item';

  applyElGeom(el, item);

  if (item.type === 'f') {
    el.style.background = def.bg || '#e8e0d8';
    el.style.borderColor = def.bc || '#a09080';
    el.style.color = def.bc || '#605040';
  }

  el.innerHTML = `
    <div class="item-ctrl">
      <button class="ic-btn" title="Rotate" onclick="rotateItem('${item.id}')">↻</button>
      <button class="ic-btn" title="Delete" onclick="deleteItem('${item.id}')">✕</button>
    </div>
    <div class="resize-handle" data-id="${item.id}"></div>
    <div class="lbl">${item.emoji||def.emoji||''} ${item.label}</div>
    <div class="sub-lbl">${item.w}"×${item.h}"</div>
    <input class="lbl-input" type="text" value="${item.label}" data-id="${item.id}"/>
  `;

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('resize-handle')) return;
    if (e.target.classList.contains('ic-btn')) return;
    if (e.target.classList.contains('lbl-input')) return;
    startDrag(e, item);
  });
  el.addEventListener('dblclick', e => {
    if (e.target.classList.contains('lbl-input')) return;
    startRename(item);
  });
  el.addEventListener('click', e => {
    if (e.target.classList.contains('ic-btn')) return;
    select(item);
  });

  // resize handle — all items
  el.querySelector('.resize-handle').addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    resz = { item, startX: e.clientX, startY: e.clientY, startW: inPx(item.w), startH: inPx(item.h) };
  });

  // label input blur
  const inp = el.querySelector('.lbl-input');
  inp.addEventListener('blur', () => finishRename(item));
  inp.addEventListener('keydown', e => { if (e.key==='Enter') inp.blur(); if(e.key==='Escape'){inp.style.display='none';} });

  return el;
}

function applyElGeom(el, item) {
  // w/h already reflect current orientation (swapped on rotate)
  const pw = inPx(item.w);
  const ph = inPx(item.h);
  el.style.left   = item.x + 'px';
  el.style.top    = item.y + 'px';
  el.style.width  = pw + 'px';
  el.style.height = ph + 'px';
  el.style.zIndex = item.zIndex;
  el.style.transform = '';
}

function refreshEl(item) {
  const def = [...FURNITURE,...MARKERS].find(d => d.id === item.defId) || {};
  applyElGeom(item.el, item);
  const lbl = item.el.querySelector('.lbl');
  const sub = item.el.querySelector('.sub-lbl');
  if (lbl) lbl.textContent = (def.emoji||'') + ' ' + item.label;
  if (sub) sub.textContent = item.w + '"×' + item.h + '"';
}

// ═══════════════════════════════════════════
// SELECT
// ═══════════════════════════════════════════
function select(item) {
  items.forEach(i => i.el.classList.remove('selected'));
  selected = item;
  item.el.classList.add('selected');
  document.getElementById('sel-panel').style.display = '';
  updateStatus(item);
  populateInspector(item);
}

function populateInspector(item) {
  if (!item) return;
  document.getElementById('ins-label').value = item.label;
  document.getElementById('ins-w').value     = item.w;
  document.getElementById('ins-h').value     = item.h;
  // color — strip rgba if needed, fallback to neutral
  const col = item.color && item.color.startsWith('#') ? item.color : '#ddd4f0';
  document.getElementById('ins-color').value   = col;
  document.getElementById('ins-color-val').textContent = col;
  document.getElementById('ins-cat').value     = item.category || '';
  // lock button label
  document.getElementById('ins-lock-btn').textContent = item.locked ? '🔒 Locked' : '🔓 Lock';
}

function applyInspector() {
  if (!selected) return;
  const nl  = document.getElementById('ins-label').value.trim();
  const nw  = parseInt(document.getElementById('ins-w').value)  || selected.w;
  const nh  = parseInt(document.getElementById('ins-h').value)  || selected.h;
  const col = document.getElementById('ins-color').value;
  const cat = document.getElementById('ins-cat').value;
  document.getElementById('ins-color-val').textContent = col;
  if (nl) selected.label = nl;
  selected.w        = nw;
  selected.h        = nh;
  selected.color    = col;
  selected.category = cat;
  // apply color live
  if (selected.type === 'f') {
    selected.el.style.background  = col;
    selected.el.style.borderColor = adjustColor(col, -30);
    selected.el.style.color       = adjustColor(col, -80);
  }
  refreshEl(selected);
  clampItem(selected);
  updateStatus(selected);
}

// Darken a hex color by amt (0-255)
function adjustColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+amt));
  g = Math.max(0,Math.min(255,g+amt));
  b = Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function toggleLock() {
  if (!selected) return;
  selected.locked = !selected.locked;
  selected.el.classList.toggle('locked', selected.locked);
  document.getElementById('ins-lock-btn').textContent = selected.locked ? '🔒 Locked' : '🔓 Lock';
}

function duplicateSelected() {
  if (!selected) return;
  const orig = selected;
  const def  = [...FURNITURE,...MARKERS].find(d => d.id === orig.defId) || {};
  const item = {
    id: 'i' + (uid++),
    defId: orig.defId,
    type:  orig.type,
    x: Math.min(orig.x + 20, document.getElementById('room').offsetWidth  - inPx(orig.w)),
    y: Math.min(orig.y + 20, document.getElementById('room').offsetHeight - inPx(orig.h)),
    w: orig.w, h: orig.h,
    rotation: orig.rotation,
    label: orig.label + ' copy',
    zIndex: uid,
    locked: false,
    color: orig.color || def.bg || '',
    category: orig.category || '',
    el: null
  };
  item.el = makeEl(item, def);
  if (orig.color && orig.type === 'f') {
    item.el.style.background  = orig.color;
    item.el.style.borderColor = adjustColor(orig.color, -30);
    item.el.style.color       = adjustColor(orig.color, -80);
  }
  items.push(item);
  document.getElementById('room').appendChild(item.el);
  select(item);
}

function deselect() {
  items.forEach(i => i.el.classList.remove('selected'));
  selected = null;
  document.getElementById('sel-panel').style.display = 'none';
  document.getElementById('st-sel').textContent = 'none';
  document.getElementById('st-pos').textContent = '—';
  document.getElementById('st-size').textContent = '—';
}

function onRoomClick(e) {
  if (e.target === document.getElementById('room')) deselect();
}

// ═══════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════
function startDrag(e, item) {
  e.preventDefault();
  select(item);
  if (item.locked) return;
  const rect = item.el.getBoundingClientRect();
  drag = { item, ox: e.clientX - rect.left, oy: e.clientY - rect.top };
}

function onMouseMove(e) {
  if (drag) {
    const room = document.getElementById('room');
    const cr = room.getBoundingClientRect();
    const snap = document.getElementById('snapToggle').checked;
    // w/h already reflect visual footprint (swapped on each rotate call)
    const pw = inPx(drag.item.w);
    const ph = inPx(drag.item.h);
    let nx = e.clientX - cr.left - drag.ox;
    let ny = e.clientY - cr.top  - drag.oy;
    if (snap) { nx = Math.round(nx/SNAP)*SNAP; ny = Math.round(ny/SNAP)*SNAP; }
    nx = Math.max(0, Math.min(room.offsetWidth  - pw, nx));
    ny = Math.max(0, Math.min(room.offsetHeight - ph, ny));
    drag.item.x = nx; drag.item.y = ny;
    drag.item.el.style.left = nx + 'px';
    drag.item.el.style.top  = ny + 'px';
    updateStatus(drag.item);
  }
  if (resz) {
    const snap = document.getElementById('snapToggle').checked;
    const dx = e.clientX - resz.startX;
    const dy = e.clientY - resz.startY;
    let nw = Math.max(inPx(6), resz.startW + dx);
    let nh = Math.max(inPx(6), resz.startH + dy);
    if (snap) { nw = Math.round(nw/SNAP)*SNAP; nh = Math.round(nh/SNAP)*SNAP; }
    resz.item.w = pxIn(nw); resz.item.h = pxIn(nh);
    resz.item.el.style.width  = nw + 'px';
    resz.item.el.style.height = nh + 'px';
    const sub = resz.item.el.querySelector('.sub-lbl');
    if (sub) sub.textContent = resz.item.w + '"×' + resz.item.h + '"';
    updateStatus(resz.item);
  }
}

function onMouseUp() { drag = null; resz = null; renderClearances(); }

// ═══════════════════════════════════════════
// ITEM ACTIONS
// ═══════════════════════════════════════════
function rotateItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  [item.w, item.h] = [item.h, item.w]; // swap dimensions visually
  item.rotation = (item.rotation + 90) % 360;
  refreshEl(item);
  clampItem(item);
  populateInspector(item);
  renderClearances();
}

function rotateSelected() { if (selected) rotateItem(selected.id); }

function deleteItem(id) {
  const idx = items.findIndex(i => i.id === id);
  if (idx === -1) return;
  items[idx].el.remove();
  items.splice(idx, 1);
  if (selected && selected.id === id) deselect();
  renderClearances();
}

function deleteSelected() { if (selected) deleteItem(selected.id); }

function bringForward() {
  if (!selected) return;
  selected.zIndex = Math.max(...items.map(i=>i.zIndex)) + 1;
  selected.el.style.zIndex = selected.zIndex;
}

function sendBackward() {
  if (!selected) return;
  selected.zIndex = Math.max(1, Math.min(...items.map(i=>i.zIndex)) - 1);
  selected.el.style.zIndex = selected.zIndex;
}

function startRename(item) {
  const inp = item.el.querySelector('.lbl-input');
  inp.style.display = 'block';
  inp.value = item.label;
  inp.focus(); inp.select();
}

function finishRename(item) {
  const inp = item.el.querySelector('.lbl-input');
  inp.style.display = 'none';
  item.label = inp.value.trim() || item.label;
  refreshEl(item);
}

function editLabel() { if (selected) startRename(selected); }

// ═══════════════════════════════════════════
// CLAMP
// ═══════════════════════════════════════════
function clampItem(item) {
  const room = document.getElementById('room');
  // w/h already reflect visual footprint (swapped on each rotate call)
  const pw = inPx(item.w);
  const ph = inPx(item.h);
  item.x = Math.max(0, Math.min(room.offsetWidth  - pw, item.x));
  item.y = Math.max(0, Math.min(room.offsetHeight - ph, item.y));
  item.el.style.left = item.x + 'px';
  item.el.style.top  = item.y + 'px';
}
function clampAll() { items.forEach(clampItem); }

// ═══════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════
function updateStatus(item) {
  document.getElementById('st-sel').textContent  = item.label;
  document.getElementById('st-pos').textContent  = pxIn(item.x) + '"x, ' + pxIn(item.y) + '"y from top-left';
  document.getElementById('st-size').textContent = item.w + '" × ' + item.h + '"';
}

// ═══════════════════════════════════════════
// SAVE / LOAD / RESET / PRINT
// ═══════════════════════════════════════════
function saveLayout() {
  const data = {
    roomW, roomL,
    uid,
    items: items.map(i => ({
      id:i.id, defId:i.defId, type:i.type,
      x:i.x, y:i.y, w:i.w, h:i.h,
      rotation:i.rotation, label:i.label, zIndex:i.zIndex,
      locked:i.locked||false, color:i.color||'', category:i.category||''
    }))
  };
  localStorage.setItem('rbc-layout-v1', JSON.stringify(data));
  alert('✅ Layout saved!');
}

function loadLayout() {
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if ((e.key === 'r' || e.key === 'R') && selected) rotateItem(selected.id);
    if (e.key === 'Delete' && selected) deleteSelected();
  });

  const saved = localStorage.getItem('rbc-layout-v1');
  if (!saved) { alert('No saved layout found.'); return; }
  try {
    clearItems();
    restoreData(JSON.parse(saved));
    alert('📂 Layout loaded!');
  } catch(e) { alert('Could not load layout.'); }
}

function restoreData(data) {
  if (data.roomW) { document.getElementById('rw').value = data.roomW; }
  if (data.roomL) { document.getElementById('rl').value = data.roomL; }
  applyRoom();
  if (data.uid) uid = data.uid;
  const room = document.getElementById('room');
  if (data.items) {
    data.items.forEach(d => {
      const item = { ...d, el: null };
      item.el = makeEl(item);
      if (item.color && item.type === 'f' && item.color.startsWith('#')) {
        item.el.style.background  = item.color;
        item.el.style.borderColor = adjustColor(item.color, -30);
        item.el.style.color       = adjustColor(item.color, -80);
      }
      if (item.locked) item.el.classList.add('locked');
      items.push(item);
      room.appendChild(item.el);
    });
  }
}

function clearItems() {
  items.forEach(i => i.el && i.el.remove());
  items = [];
  deselect();
}

function resetLayout() {
  if (!confirm('Clear all items from the canvas?')) return;
  clearItems();
}

function printLayout() {
  window.print();
}

function saveNotes() {
  localStorage.setItem('rbc-notes-v1', document.getElementById('notes').value);
  alert('📝 Notes saved!');
}
function loadNotes() {
  const n = localStorage.getItem('rbc-notes-v1');
  if (n) document.getElementById('notes').value = n;
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function inPx(inches) { return inches * PX_PER_FT / 12; }
function pxIn(px)     { return Math.round(px * 12 / PX_PER_FT); }

// ═══════════════════════════════════════════
// CLEARANCE ZONES
// ═══════════════════════════════════════════
function renderClearances() {
  const room = document.getElementById('room');
  room.querySelectorAll('.clearance').forEach(e => e.remove());
  if (!document.getElementById('clearanceToggle').checked) return;

  items.forEach(item => {
    const def = [...FURNITURE,...MARKERS].find(d => d.id === item.defId) || {};
    const id  = item.defId;
    const px  = inPx(item.w), py = inPx(item.h);

    // Desk chair clearance: 24" in front (bottom of block)
    if (id === 'desk') {
      addClearance(room, item.x, item.y + py, px, inPx(24), 'clr-desk', '💺 chair zone 24"');
    }
    // Door swing clearance: square arc approximation
    if (id === 'door' || id === 'bathroom') {
      const sw = Math.max(px, py);
      addClearance(room, item.x, item.y + py, sw, sw * 0.55, 'clr-door', '🚪 swing');
    }
    // No-block zone gets own overlay
    if (id === 'noblock') {
      addClearance(room, item.x, item.y, px, py, 'clr-noblock', '⛔ no-block');
    }
  });
}

function addClearance(room, x, y, w, h, cls, label) {
  const el = document.createElement('div');
  el.className = 'clearance ' + cls;
  el.style.left   = x + 'px';
  el.style.top    = y + 'px';
  el.style.width  = w + 'px';
  el.style.height = h + 'px';
  el.textContent  = label;
  room.appendChild(el);
}
</script>
